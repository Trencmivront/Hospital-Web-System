<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="stylesheet" href="../../css/global.css">
        <link rel="stylesheet" href="../../css/global/register.css">
        <script src="/frontend/js/global/registration.js" defer></script>
    </head>


    <body style="justify-content: center; align-items: center; height: 100vh;">

        <div class="div-form">

            <form id="registrationForm">
                <div class="form-header">
                    <h2>Patient Registration</h2>
                    <p>Please fill in the information below to create a new patient record.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name:</label>
                        <input id="first_name" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name:</label>
                        <input id="last_name" type="text" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tc_no">TC No:</label>
                        <input id="tc_no" type="text" maxlength="11" minlength="11" required>
                    </div>
                    <div class="form-group">
                        <label for="birth_date">Birth Date:</label>
                        <input id="birth_date" type="date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select id="gender">
                            <!--fetch from database-->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="blood_group">Blood Group:</label>
                        <select id="blood_group">
                            <!--fetch from database-->
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone_num">Phone Number:</label>
                        <input id="phone_num" type="tel" placeholder="05XXXXXXXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input id="email" type="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="pat_password">Password:</label>
                        <input id="pat_password" type="password" required>
                    </div>
                    <div class="form-group">
                        <label for="re_pat_password">Confirm Password:</label>
                        <input id="re_pat_password" type="password" required>
                    </div>
                </div>

                <div class="form-row">
                    <input id="form_submit" type="submit" value="Send">
                </div>
            </form>
            <div id="errorMessage">

            </div>
        </div>

    </body>

</html>
