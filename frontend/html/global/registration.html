

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="stylesheet" href="/frontend/css/global.css">
        <link rel="stylesheet" href="/frontend/css/global/register.css">
        <script src="/frontend/js/global/global.js" defer></script>
        <script src="/frontend/js/global/registration.js?v=3" defer></script>
    </head>

<!--Background image for registration page-->
<body class="page-shell" style="background-image: url('/imgs/registration_background.png'); background-size: cover; background-attachment: fixed;">
    <div class="div-form">

        <div id="registration-section" style="width: 100%;">
            <form id="registrationForm">
                <div class="form-header">
                    <h2>Patient Registration</h2>
                    <p>Please fill in the information below to create a new patient record.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name:</label>
                        <input id="first_name" type="text" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name:</label>
                        <input id="last_name" type="text" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tc_no">TC No:</label>
                        <input id="tc_no" type="text" maxlength="11" minlength="11" required>
                    </div>
                    <div class="form-group">
                        <label for="birth_date">Birth Date:</label>
                        <input id="birth_date" type="date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select id="gender" required>
                            <option value="">-choose-</option>
                            <option value="M" >Male</option>
                            <option value="F">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="blood_group">Blood Group:</label>
                        <select id="blood_group" required>
                            <option value="">-choose-</option>
                            <!--fetch from database-->
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone_num">Phone Number:</label>
                        <input id="phone_num" type="tel" placeholder="05XXXXXXXXX" maxlength="11" minlength="11" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input id="email" type="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="pat_password">Password:</label>
                        <input id="pat_password" type="password" required>
                    </div>
                    <div class="form-group">
                        <label for="re_pat_password">Confirm Password:</label>
                        <input id="re_pat_password" type="password" required>
                    </div>
                </div>

                <div class="form-row flex-center-content">
                    <input id="form_submit" type="submit" value="Send">
                </div>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                Have an account? <a href="/login">Log In</a>
            </div>
        </div>

        <div id="verification-section" style="display: none; width: 100%;">
            <div class="form-header">
                <h2>Verify Your Email</h2>
                <p>We've sent a 6-digit verification code to your email.</p>
            </div>

            <form id="verification-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="verificationCode">Verification Code:</label>
                        <input id="verificationCode" type="text" placeholder="Enter 6-digit code" maxlength="6" required>
                    </div>
                </div>
                <div class="form-row flex-center-content">
                    <input id="verifyButton" type="submit" value="Verify Code" style="width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                </div>
            </form>

            <div class="extra-links" style="text-align: center; margin-top: 20px;">
                <p id="resend-container">
                    Didn't receive the code?
                    <a href="#" id="resendCode">Resend Code</a>
                    <span id="timerDisplay" style="display: none; color: #686666; font-size: 14px; margin-left: 5px;">(02:00)</span>
                </p>
            </div>
        </div>

        <div id="errorMessage"></div>
    </div>
        <div class="flex-center-content">
            <a style="text-decoration: none;" class="flex-wrap-space" href="/">NOVA Hospital<img src="/imgs/novaLogo.avif" width="20px"></a>  All Rights Reserved
        </div>
            
    </body>

</html>
