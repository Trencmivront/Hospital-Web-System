<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Hospital - Patient Login</title>

<link rel="stylesheet" href="/frontend/css/style.css">
<script src="/frontend/js/user/logIn.js?v=1.3"></script>

<style>

/* Login Page Background */
body.login-page{
margin:0;
padding:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background-image:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("../../../imgs/novamm.jpeg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


/* Login Card */
.login-card{
background:rgba(255,255,255,.96);
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(5, 5, 5, 0.35);
width:100%;
max-width:420px;
text-align:center;
}

.login-card h2{
color:#020814;
font-size:30px;
margin-bottom:10px;
}

.login-card p{
color:#686666;
margin-bottom:25px;
}


/* Inputs */
.input-group{
text-align:left;
margin-bottom:20px;
}
/* to control the writing of email and password */ 
.input-group label{
display:block;
font-weight:600;
margin-bottom:8px;
}
/* to control the width of the input fields whtch boxs of email and password */
.input-group input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

.input-group input:focus{
outline:none;
border-color:#191995;
}


/* Remember Me */
.remember{
text-align:left;
margin-bottom:18px;
font-size:14px;
}


/* Login Button */
.submit-btn{
width:100%;
padding:15px;
background:#1d3fa6;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#081d4a;
}


/* Links */
.extra-links{
margin-top:20px;
line-height:2;
}

.extra-links a{
text-decoration:none;
color:#1d3fa6;
font-weight:500;
}

.extra-links a:hover{
text-decoration:underline;
}

.back-link{
display:inline-block;
margin-top:20px;
font-size:14px;
text-decoration:none;
color:#1d3fa6;
}

</style>
</head>


<body class="login-page">

<div class="login-card">

<div id="login-section">
    <h2>Patient Login</h2>
    <p>
    Sign in to access your appointments and medical records
    </p>

    <form id="login-form">
        <!-- Email -->
        <div class="input-group">
            <label>Email Address</label>
            <input id="email"
            type="email"
            placeholder="name@example.com"
            required>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Password</label>
            <input id="password"
            type="password"
            placeholder="Enter your password"
            required>
        </div>

        <!-- Remember Me -->
        <div class="remember">
            <input id="rememberMe" type="checkbox">
            Remember Me
        </div>

        <button id="submitButton" type="submit" class="submit-btn">
            Sign In
        </button>
    </form>
</div>

<div id="verification-section" style="display: none;">
    <h2>Verify Your Identity</h2>
    <p>
    We've sent a 6-digit verification code to your email.
    </p>

    <form id="verification-form">
        <!-- Verification Code -->
        <div class="input-group">
            <label>Verification Code</label>
            <input id="verificationCode"
            type="text"
            placeholder="Enter 6-digit code"
            maxlength="6"
            required>
        </div>

        <button id="verifyButton" type="submit" class="submit-btn">
            Verify Code
        </button>
    </form>

    <div class="extra-links">
        <p id="resend-container">
            Didn't receive the code?
            <a href="#" id="resendCode">Resend Code</a>
            <span id="timerDisplay" style="display: none; color: #686666; font-size: 14px; margin-left: 5px;">(02:00)</span>
        </p>
    </div>
</div>

<div id="errorMessage"></div>


<div class="extra-links">

<p>
<a href="#">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

</div>


<a href="/" class="back-link">
Return to Home
</a>

</div>

</body>
</html>
