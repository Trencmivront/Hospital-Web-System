<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - Nova Hospital</title>
    <!--First apply global then profile-->
    <link rel="stylesheet" href="/frontend/css/user/profile.css">
    <link rel="stylesheet" href="/frontend/css/global.css">
    <script src="/frontend/js/user/profile.js?v=1.0" defer></script>
</head>
<body>

    <header class="profile-top-bar">
        <div class="top-bar-content flex-wrap-space">
            <a href="/" class="top-bar-brand flex-center-content">
                <img src="/imgs/novaLogo.avif" alt="Logo">
                <span>Nova Hospital</span>
            </a>
            <div class="top-bar-user-name flex-center-content">
                <span>Welcome, <strong>John Doe</strong></span>
                <button id="logOutButton" class="logout-link">Logout</button>
            </div>
        </div>
    </header>

    <div class="profile-wrapper">

        <main class="profile-main-content">
            <!-- Account Details Section -->
            <section id="account-details" class="content-section">
                <div class="info-box">
                    <div class="box-header flex-wrap-space">
                            <h3>Personal Information</h3>
                        <button class="action-btn">Edit</button>
                        </div>
                        <div class="info-content">
                            <div class="info-row">
                                <span class="label">Full Name:</span>
                                <span class="value" id="full_name"></span>
                            </div>
                            <div class="info-row">
                                <span class="label">TC Number:</span>
                                <span class="value" id="tc_no"></span>
                            </div>
                            <div class="info-row">
                                <span class="label">Email:</span>
                                <span class="value" id="email"></span>
                            </div>
                            <div class="info-row">
                                <span class="label">Phone:</span>
                                <span class="value" id="tel_no"></span>
                            </div>
                            <div class="info-row">
                                <span class="label">Blood Type:</span>
                                <span class="value" id="blood_group"></span>
                            </div>
                            <div class="info-row">
                                <span class="label">Date of Birth:</span>
                                <span class="value" id="birth_date"></span>
                            </div>
                        </div>
                    </div>
            </section>
            <section class="content-section">
                    <!-- Appointments Box -->
                <div class="info-box">
                        <div class="box-header flex-wrap-space">
                            <h3>Your Appointments</h3>
                            <button id="bookAppointmentButton" class="action-btn">+ Book New</button>
                        </div>
                        <!-- IF there is no appointment, disable the  place "book appointment"-->
                        <div class="appointments-content">
                            <div class="appointment-sub-section">
                                <!--The h4 "upcoming" or "past" based on date.-->
                                <h4 id="appointment_header"></h4>
                                <table class="appointment-table">
                                    <thead>
                                        <tr>
                                            <th>Date-Time</th>
                                            <th>Department</th>
                                            <th>Doctor</th>
                                            <th>Status</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="appointmentContainer" style="column-count: 3;overflow: scroll;">
                                        <!--Fetch date, department, doctor, status from database-->
                                    </tbody>
                                </table>
                                <div id="appointmentFetchError"></div>
                            </div>
                        </div>
                    </div>
            </section>

            </div>

            <section class="content-section">

            </section>

        </main>
    </div>
    <div id="shadowBackground" class="flex-center-content">
        <div id="bookAppointmentContainer">
            <h1 class="box-header" style="text-align: center;">Appointment Booking</h1>
            <form class="flex-center-content" style="flex-direction: column;">
                <!--First select department, then list available doctors and select doctor,
                then list available days and select day. At the end, show available time and select time-->
                <select required>
                    <option value="pluh">--Select Department--</option>
                    <!-- TODO: Fetch Departments Here-->
                </select>
                <select disabled required>
                    <option value="pluh">--Select Doctor</option>
                    <!-- TODO: Enable and Fetch Doctor Data After Selecting Department-->
                     <!--If no doctor available, don't allow and write it-->
                </select>
                <input type="date" disabled required>
                <input type="time" disabled required>
                <button class="action-btn" style="width: 50%;font-size: 1.0rem;" type="submit" disabled> Book </button>
            </form>
        </div>
    </div>

</body>
</html>
