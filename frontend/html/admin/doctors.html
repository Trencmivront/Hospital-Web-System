<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Doctors</title>
  <link rel="stylesheet" href="/frontend/css/global.css">
  <link rel="stylesheet" href="/frontend/css/admin.css">
  <script src="/frontend/js/global/global.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="/frontend/js/admin/admin-dashboard.js" defer></script>
</head>
<body>
  <header class="page-header flex-wrap-space">
    <div class="brand flex-center-content"><h1>Admin</h1></div>
    <div class="header-actions"><a class="logButton" href="/">View Site</a></div>
  </header>

  <div class="admin-shell">
    <aside class="admin-nav">
      <div class="admin-brand">Nova<span>Admin</span></div>
      <div class="admin-banner">
        <div class="banner-top">
          <span class="banner-badge">Doctors</span>
          <h3>Clinical performance</h3>
        </div>
        <p>Review doctor workload, patient count, and outcomes in one view.</p>
      </div>
      <ul>
        <li><a href="/frontend/html/admin/dashboard.html">Dashboard</a></li>
        <li><a href="/frontend/html/admin/patients.html">Patients</a></li>
        <li><a href="/frontend/html/admin/appointments.html">Appointments</a></li>
        <li><a href="/frontend/html/admin/doctors.html" class="active">Doctors</a></li>
        <li><a href="/frontend/html/admin/tables.html">Tables</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="top-actions">
          <button class="icon-btn">🔔</button>
          <button class="icon-btn">⚙️</button>
          <div class="avatar">D</div>
        </div>
      </header>

      <section class="cards small">
        <div class="card"><h4>Total Doctors</h4><p class="big">24</p></div>
      </section>

      <section class="grid">
        <div class="panel panel-large">
          <h3>Patients per Doctor</h3>
          <canvas id="doctorBarChart" height="180"></canvas>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
